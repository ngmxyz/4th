<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4th Industries</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #f3ede0;
    color: #2d2820;
    min-height: 100vh;
    padding: 40px 24px;
    line-height: 1.7;
    font-size: 15px;
  }
  .terminal {
    max-width: 640px;
    margin: 8vh auto 0;
    min-height: 320px;
  }
  .line { white-space: pre-wrap; }
  .name { font-weight: 500; color: #8a6a22; }
  .muted { color: #7f7560; }
  .rule {
    border: none;
    border-top: 1px solid #dcd1bc;
    margin: 18px 0;
  }
  a { color: #2d2820; text-decoration: none; border-bottom: 1px solid #dcd1bc; }
  a:hover { border-bottom-color: #2d2820; }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 1.1em;
    background: #8a6a22;
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="terminal" id="terminal">
    <div class="line name">4th Industries</div>
    <div class="line muted">Nathan Musso</div>
    <hr class="rule">
    <div class="line">Currently: Growth @ Base Power</div>
    <div class="line">Prev: Investor @ Technexus VC</div>
    <div class="line">Prev: Founder @ Smugglers</div>
    <div class="line">Rhodes College alum</div>
    <hr class="rule">
    <div class="line muted">Sometimes angel investing. Interested in learning about hardware, emerging markets, and value change theory.</div>
    <hr class="rule">
    <div class="line muted">nathan [at] 4th [dot] industries</div>
  </div>

  <script>
    (function () {
      const term = document.getElementById('terminal');
      const nodes = Array.from(term.children);

      const items = nodes.map(node => {
        if (node.tagName === 'HR') return { node, type: 'hr' };
        const text = node.textContent;
        node.textContent = '';
        return { node, type: 'text', text };
      });
      term.style.visibility = 'visible';

      const cursor = document.createElement('span');
      cursor.className = 'cursor';

      const CHAR_MS = 9;
      const LINE_MS = 80;

      let i = 0;
      function typeNode() {
        if (i >= items.length) {
          items[items.length - 1].node.appendChild(cursor);
          return;
        }
        const item = items[i];
        if (item.type === 'hr') {
          i++;
          setTimeout(typeNode, LINE_MS);
          return;
        }
        item.node.appendChild(cursor);
        let c = 0;
        function typeChar() {
          if (c < item.text.length) {
            cursor.insertAdjacentText('beforebegin', item.text[c]);
            c++;
            setTimeout(typeChar, CHAR_MS);
          } else {
            i++;
            setTimeout(typeNode, LINE_MS);
          }
        }
        typeChar();
      }
      typeNode();
    })();
  </script>
</body>
</html>
