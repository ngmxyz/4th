<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4th Industries</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #f4f1ea;
    color: #2b2b2b;
    min-height: 100vh;
    padding: 40px 24px;
    line-height: 1.7;
    font-size: 15px;
  }

  .terminal {
    max-width: 640px;
    margin: 8vh auto 0;
  }

  .line { white-space: pre-wrap; }

  .name { font-weight: 500; }

  .muted { color: #6b6b6b; }

  .rule {
    border: none;
    border-top: 1px solid #cfc9bd;
    margin: 18px 0;
  }

  a { color: #2b2b2b; text-decoration: none; border-bottom: 1px solid #cfc9bd; }
  a:hover { border-bottom-color: #2b2b2b; }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 1.1em;
    background: #2b2b2b;
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="terminal">
    <div class="line name">4th Industries</div>
    <div class="line muted">Nathan Musso</div>

    <hr class="rule">

    <div class="line">Currently: Growth @ Base Power</div>
    <div class="line">Prev: Investor @ Technexus VC</div>
    <div class="line">Prev: Founder @ Smugglers</div>
    <div class="line">Rhodes College alum</div>

    <hr class="rule">

    <div class="line muted">Sometimes angel investing. Currently interested in metaethics, emerging markets, and weird business models. nathan [at] 4th [dot] industries<span class="cursor"></span></div>
  </div>
</body>
</html>
